{% extends "base.html" %}
{% block title %}Notifikasi{% endblock %}
{% block header %}Notifikasi{% endblock %}
{% block content %}

<div class="card divide-y divide-slate-100">
  {% for n in daftar %}
  <a href="{{ url_for('tiket_detail', tiket_id=n.id_tiket) if n.id_tiket else '#' }}" class="flex items-start gap-3 px-5 py-3.5 hover:bg-slate-50">
    <span class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0 mt-0.5">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
    </span>
    <div class="min-w-0">
      <p class="text-sm text-slate-700">{{ n.pesan }}</p>
      <p class="text-xs text-slate-400 mt-0.5">{{ n.created_at.strftime('%d-%m-%Y %H:%M') }}</p>
    </div>
  </a>
  {% else %}
  <div class="px-5 py-16 text-center">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" class="mx-auto text-slate-300 mb-2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
    <p class="text-sm text-slate-400">Belum ada notifikasi.</p>
  </div>
  {% endfor %}
</div>

{% endblock %}
